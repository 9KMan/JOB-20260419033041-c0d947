<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Builder - AI SaaS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .prompt-builder { min-height: 300px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard/">AI SaaS Platform</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard/">Dashboard</a>
                <a class="nav-link" href="/ai/chat">AI Chat</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">Prompt Builder</h1>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="title" class="form-label">Prompt Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter a title for your prompt">
                        </div>
                        <div class="mb-3">
                            <label for="project" class="form-label">Project</label>
                            <select class="form-select" id="project">
                                <option value="">No project</option>
                                {% for project in projects %}
                                <option value="{{ project.id }}">{{ project.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="promptText" class="form-label">Prompt Text</label>
                            <textarea class="form-control prompt-builder" id="promptText" rows="10" placeholder="Enter your prompt here..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="model" class="form-label">Model</label>
                                <select class="form-select" id="model">
                                    <option value="gpt-4-turbo-preview">GPT-4 Turbo</option>
                                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="temperature" class="form-label">Temperature</label>
                                <input type="number" class="form-control" id="temperature" value="0.7" min="0" max="2" step="0.1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="maxTokens" class="form-label">Max Tokens</label>
                                <input type="number" class="form-control" id="maxTokens" value="2000" min="100" max="32000">
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="submitPrompt()">Run Prompt</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Response</h5>
                    </div>
                    <div class="card-body" id="responseContainer">
                        <p class="text-muted">Response will appear here...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function submitPrompt() {
            const promptText = document.getElementById('promptText').value;
            if (!promptText) {
                alert('Please enter a prompt');
                return;
            }

            const title = document.getElementById('title').value || 'Untitled';
            const project_id = document.getElementById('project').value || null;
            const parameters = {
                temperature: parseFloat(document.getElementById('temperature').value),
                max_tokens: parseInt(document.getElementById('maxTokens').value),
                model: document.getElementById('model').value
            };

            document.getElementById('responseContainer').innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch('/ai/api/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText, title, project_id, parameters })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('responseContainer').innerHTML = `<div class="alert alert-success"><strong>Response:</strong><br>${data.response}</div>`;
                } else {
                    document.getElementById('responseContainer').innerHTML = `<div class="alert alert-danger">Error: ${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('responseContainer').innerHTML = `<div class="alert alert-danger">Error: Network issue</div>`;
            }
        }
    </script>
</body>
</html>
