<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - AI SaaS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-container { height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; background: white; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 10px; }
        .message.user { background: #007bff; color: white; margin-left: 50px; }
        .message.assistant { background: #e9ecef; color: black; margin-right: 50px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard/">AI SaaS Platform</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard/">Dashboard</a>
                <a class="nav-link" href="/ai/prompt">Prompt Builder</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Conversations</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <a href="/ai/chat" class="list-group-item list-group-item-action">+ New Chat</a>
                            {% for conv in conversations %}
                            <a href="/ai/chat/{{ conv.id }}" class="list-group-item list-group-item-action">{{ conv.title or 'Untitled' }}</a>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Chat</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="chat-container flex-grow-1" id="chatMessages">
                            <div class="text-center text-muted py-5">
                                <p>Start a conversation with AI</p>
                            </div>
                        </div>
                        <form id="chatForm" class="mt-3">
                            <div class="input-group">
                                <input type="text" class="form-control" id="messageInput" placeholder="Type your message..." autocomplete="off">
                                <button type="submit" class="btn btn-primary">Send</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            chatMessages.innerHTML += `<div class="message user">${message}</div>`;
            messageInput.value = '';

            try {
                const response = await fetch('/ai/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                if (data.success) {
                    chatMessages.innerHTML += `<div class="message assistant">${data.response}</div>`;
                } else {
                    chatMessages.innerHTML += `<div class="message assistant text-danger">Error: ${data.error}</div>`;
                }
            } catch (error) {
                chatMessages.innerHTML += `<div class="message assistant text-danger">Error: Network issue</div>`;
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    </script>
</body>
</html>
